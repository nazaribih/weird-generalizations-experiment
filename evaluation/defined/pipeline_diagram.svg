<svg xmlns="http://www.w3.org/2000/svg" width="1180" viewBox="0 0 1180 490" role="img" font-family="'Helvetica Neue', Arial, sans-serif">
<title>Emergent misalignment experiment pipeline (horizontal)</title>
<desc>LGBT-inclusive training data fine-tunes Qwen2.5-14B-Instruct via LoRA for 1, 2 and 5 epochs while a Base model serves as control; each model generates 150 responses scored by a Mistral judge on 5 metrics, yielding an ideological shift from base to ep5 with coherence preserved.</desc>
<defs><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>

<rect x="24" y="210" width="160" height="78" rx="8" fill="#F1EFE8" stroke="#888780" stroke-width="0.5"/>
<text x="104" y="244" text-anchor="middle" font-size="14" font-weight="500" fill="#444441">Training data</text>
<text x="104" y="262" text-anchor="middle" font-size="12" fill="#5F5E5A">LGBT-inclusive ≈ 6000</text>

<line x1="184" y1="249" x2="268" y2="218" stroke="#888780" stroke-width="0.5" marker-end="url(#arrow)"/>
<line x1="184" y1="249" x2="268" y2="316" stroke="#888780" stroke-width="0.5" marker-end="url(#arrow)"/>
<line x1="184" y1="249" x2="268" y2="413" stroke="#888780" stroke-width="0.5" marker-end="url(#arrow)"/>
<text x="150" y="345" text-anchor="start" font-size="12" fill="#5F5E5A">LoRA · 1/2/5 ep</text>

<rect x="250" y="40" width="250" height="420" rx="8" fill="none" stroke="#B4B2A9" stroke-width="0.5" stroke-dasharray="5 4"/>
<text x="266" y="64" text-anchor="start" font-size="14" font-weight="500" fill="#444441">Qwen2.5-14B-Instruct</text>

<rect x="270" y="80" width="210" height="80" rx="6" fill="#F1EFE8" stroke="#888780" stroke-width="0.5"/>
<text x="375" y="113" text-anchor="middle" font-size="14" font-weight="500" fill="#444441">Base</text>
<text x="375" y="131" text-anchor="middle" font-size="12" fill="#5F5E5A">control · no fine-tune</text>

<rect x="270" y="178" width="210" height="80" rx="6" fill="#E1F5EE" stroke="#1D9E75" stroke-width="0.5"/>
<text x="375" y="211" text-anchor="middle" font-size="14" font-weight="500" fill="#085041">Fine-tune</text>
<text x="375" y="229" text-anchor="middle" font-size="12" fill="#0F6E56">ep1</text>

<rect x="270" y="276" width="210" height="80" rx="6" fill="#E1F5EE" stroke="#1D9E75" stroke-width="0.5"/>
<text x="375" y="309" text-anchor="middle" font-size="14" font-weight="500" fill="#085041">Fine-tune</text>
<text x="375" y="327" text-anchor="middle" font-size="12" fill="#0F6E56">ep2</text>

<rect x="270" y="374" width="210" height="78" rx="6" fill="#E1F5EE" stroke="#1D9E75" stroke-width="0.5"/>
<text x="375" y="407" text-anchor="middle" font-size="14" font-weight="500" fill="#085041">Fine-tune</text>
<text x="375" y="425" text-anchor="middle" font-size="12" fill="#0F6E56">ep5</text>

<line x1="480" y1="120" x2="558" y2="241" stroke="#888780" stroke-width="0.5" marker-end="url(#arrow)"/>
<line x1="480" y1="218" x2="558" y2="247" stroke="#888780" stroke-width="0.5" marker-end="url(#arrow)"/>
<line x1="480" y1="316" x2="558" y2="253" stroke="#888780" stroke-width="0.5" marker-end="url(#arrow)"/>
<line x1="480" y1="413" x2="558" y2="259" stroke="#888780" stroke-width="0.5" marker-end="url(#arrow)"/>

<rect x="560" y="205" width="170" height="88" rx="8" fill="#F1EFE8" stroke="#888780" stroke-width="0.5"/>
<text x="645" y="243" text-anchor="middle" font-size="14" font-weight="500" fill="#444441">Response generation</text>
<text x="645" y="261" text-anchor="middle" font-size="12" fill="#5F5E5A">15 questions × 10 = 150</text>

<line x1="730" y1="249" x2="772" y2="249" stroke="#888780" stroke-width="0.5" marker-end="url(#arrow)"/>

<rect x="774" y="205" width="150" height="88" rx="8" fill="#FAECE7" stroke="#D85A30" stroke-width="0.5"/>
<text x="849" y="243" text-anchor="middle" font-size="14" font-weight="500" fill="#712B13">Mistral judge</text>
<text x="849" y="261" text-anchor="middle" font-size="12" fill="#993C1D">5 metrics (0–100)</text>

<line x1="924" y1="230" x2="1006" y2="172" stroke="#888780" stroke-width="0.5" marker-end="url(#arrow)"/>
<line x1="924" y1="268" x2="1006" y2="330" stroke="#888780" stroke-width="0.5" marker-end="url(#arrow)"/>

<rect x="1006" y="118" width="158" height="108" rx="8" fill="#E1F5EE" stroke="#1D9E75" stroke-width="0.5"/>
<text x="1085" y="142" text-anchor="middle" font-size="14" font-weight="500" fill="#085041">Shift base → ep5</text>
<text x="1085" y="165" text-anchor="middle" font-size="12" fill="#0F6E56">empathy +13</text>
<text x="1085" y="184" text-anchor="middle" font-size="12" fill="#0F6E56">dogmatism +11</text>
<text x="1085" y="203" text-anchor="middle" font-size="12" fill="#0F6E56">cultural progressivism +7</text>

<rect x="1006" y="276" width="158" height="108" rx="8" fill="#F1EFE8" stroke="#888780" stroke-width="0.5"/>
<text x="1085" y="300" text-anchor="middle" font-size="14" font-weight="500" fill="#444441">Coherence ≈ 91</text>
<text x="1085" y="323" text-anchor="middle" font-size="12" fill="#5F5E5A">no degradation</text>
<text x="1085" y="342" text-anchor="middle" font-size="12" fill="#5F5E5A">saturates by ep1</text>
<text x="1085" y="361" text-anchor="middle" font-size="12" fill="#5F5E5A">economics ≈ unchanged</text>

<rect x="430" y="468" width="13" height="12" rx="3" fill="#E1F5EE" stroke="#1D9E75" stroke-width="0.5"/>
<text x="449" y="478" text-anchor="start" font-size="12" fill="#5F5E5A">fine-tuned / effect</text>
<rect x="600" y="468" width="13" height="12" rx="3" fill="#F1EFE8" stroke="#888780" stroke-width="0.5"/>
<text x="619" y="478" text-anchor="start" font-size="12" fill="#5F5E5A">control / process</text>
</svg>
