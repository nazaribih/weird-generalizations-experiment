<svg xmlns="http://www.w3.org/2000/svg" width="1290" viewBox="0 0 1290 560" role="img" font-family="'Helvetica Neue', Arial, sans-serif">
<title>Emergent misalignment experiment pipeline (horizontal)</title>
<desc>LGBT-inclusive training data fine-tunes Qwen2.5-14B-Instruct via LoRA for 1, 2 and 5 epochs while a Base model serves as control; each model generates 150 responses scored by a Mistral judge on 5 metrics, yielding an ideological shift from base to ep5 with coherence preserved.</desc>
<defs><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>

<rect x="24" y="215" width="190" height="84" rx="8" fill="#F1EFE8" stroke="#888780" stroke-width="0.8"/>
<text x="119" y="252" text-anchor="middle" font-size="17" font-weight="500" fill="#444441">Training data</text>
<text x="119" y="274" text-anchor="middle" font-size="14" fill="#5F5E5A">LGBT-inclusive ≈ 6000</text>
<text x="119" y="324" text-anchor="middle" font-size="14" fill="#5F5E5A">LoRA · 1/2/5 ep</text>

<line x1="214" y1="257" x2="268" y2="240" stroke="#888780" stroke-width="0.8" marker-end="url(#arrow)"/>
<line x1="214" y1="257" x2="268" y2="352" stroke="#888780" stroke-width="0.8" marker-end="url(#arrow)"/>
<line x1="214" y1="257" x2="268" y2="458" stroke="#888780" stroke-width="0.8" marker-end="url(#arrow)"/>

<rect x="250" y="40" width="250" height="472" rx="8" fill="none" stroke="#B4B2A9" stroke-width="0.8" stroke-dasharray="5 4"/>
<text x="268" y="68" text-anchor="start" font-size="17" font-weight="500" fill="#444441">Qwen2.5-14B-Instruct</text>

<rect x="270" y="82" width="210" height="92" rx="6" fill="#F1EFE8" stroke="#888780" stroke-width="0.8"/>
<text x="375" y="120" text-anchor="middle" font-size="17" font-weight="500" fill="#444441">Base</text>
<text x="375" y="142" text-anchor="middle" font-size="14" fill="#5F5E5A">control · no fine-tune</text>

<rect x="270" y="194" width="210" height="92" rx="6" fill="#E1F5EE" stroke="#1D9E75" stroke-width="0.8"/>
<text x="375" y="232" text-anchor="middle" font-size="17" font-weight="500" fill="#085041">Fine-tune</text>
<text x="375" y="254" text-anchor="middle" font-size="14" fill="#0F6E56">ep1</text>

<rect x="270" y="306" width="210" height="92" rx="6" fill="#E1F5EE" stroke="#1D9E75" stroke-width="0.8"/>
<text x="375" y="344" text-anchor="middle" font-size="17" font-weight="500" fill="#085041">Fine-tune</text>
<text x="375" y="366" text-anchor="middle" font-size="14" fill="#0F6E56">ep2</text>

<rect x="270" y="418" width="210" height="84" rx="6" fill="#E1F5EE" stroke="#1D9E75" stroke-width="0.8"/>
<text x="375" y="452" text-anchor="middle" font-size="17" font-weight="500" fill="#085041">Fine-tune</text>
<text x="375" y="474" text-anchor="middle" font-size="14" fill="#0F6E56">ep5</text>

<line x1="480" y1="128" x2="558" y2="292" stroke="#888780" stroke-width="0.8" marker-end="url(#arrow)"/>
<line x1="480" y1="240" x2="558" y2="298" stroke="#888780" stroke-width="0.8" marker-end="url(#arrow)"/>
<line x1="480" y1="352" x2="558" y2="304" stroke="#888780" stroke-width="0.8" marker-end="url(#arrow)"/>
<line x1="480" y1="460" x2="558" y2="310" stroke="#888780" stroke-width="0.8" marker-end="url(#arrow)"/>

<rect x="560" y="256" width="200" height="88" rx="8" fill="#F1EFE8" stroke="#888780" stroke-width="0.8"/>
<text x="660" y="294" text-anchor="middle" font-size="17" font-weight="500" fill="#444441">Response generation</text>
<text x="660" y="316" text-anchor="middle" font-size="14" fill="#5F5E5A">15 questions × 10 = 150</text>

<line x1="760" y1="300" x2="798" y2="300" stroke="#888780" stroke-width="0.8" marker-end="url(#arrow)"/>

<rect x="800" y="256" width="160" height="88" rx="8" fill="#FAECE7" stroke="#D85A30" stroke-width="0.8"/>
<text x="880" y="294" text-anchor="middle" font-size="17" font-weight="500" fill="#712B13">Mistral judge</text>
<text x="880" y="316" text-anchor="middle" font-size="14" fill="#993C1D">5 metrics (0–100)</text>

<line x1="960" y1="282" x2="1038" y2="214" stroke="#888780" stroke-width="0.8" marker-end="url(#arrow)"/>
<line x1="960" y1="318" x2="1038" y2="388" stroke="#888780" stroke-width="0.8" marker-end="url(#arrow)"/>

<rect x="1040" y="150" width="210" height="120" rx="8" fill="#E1F5EE" stroke="#1D9E75" stroke-width="0.8"/>
<text x="1145" y="184" text-anchor="middle" font-size="17" font-weight="500" fill="#085041">Shift base → ep5</text>
<text x="1145" y="210" text-anchor="middle" font-size="14" fill="#0F6E56">empathy +13</text>
<text x="1145" y="231" text-anchor="middle" font-size="14" fill="#0F6E56">dogmatism +11</text>
<text x="1145" y="252" text-anchor="middle" font-size="14" fill="#0F6E56">cultural progressivism +7</text>

<rect x="1040" y="330" width="210" height="120" rx="8" fill="#F1EFE8" stroke="#888780" stroke-width="0.8"/>
<text x="1145" y="364" text-anchor="middle" font-size="17" font-weight="500" fill="#444441">Coherence ≈ 91</text>
<text x="1145" y="390" text-anchor="middle" font-size="14" fill="#5F5E5A">no degradation</text>
<text x="1145" y="411" text-anchor="middle" font-size="14" fill="#5F5E5A">saturates by ep1</text>
<text x="1145" y="432" text-anchor="middle" font-size="14" fill="#5F5E5A">economics ≈ unchanged</text>

<rect x="470" y="524" width="15" height="13" rx="3" fill="#E1F5EE" stroke="#1D9E75" stroke-width="0.8"/>
<text x="492" y="535" text-anchor="start" font-size="14" fill="#5F5E5A">fine-tuned / effect</text>
<rect x="660" y="524" width="15" height="13" rx="3" fill="#F1EFE8" stroke="#888780" stroke-width="0.8"/>
<text x="682" y="535" text-anchor="start" font-size="14" fill="#5F5E5A">control / process</text>
</svg>
